name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            asset_name: s3backup-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: s3backup-linux-arm64
          # macOS
          - goos: darwin
            goarch: amd64
            asset_name: s3backup-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: s3backup-darwin-arm64
          # Windows
          - goos: windows
            goarch: amd64
            asset_name: s3backup-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset_name: s3backup-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/${{ matrix.asset_name }} \
            ./cmd

      - name: Generate checksum
        run: |
          cd dist
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create combined checksums file
        run: |
          cat dist/*.sha256 > dist/checksums.txt
          cat dist/checksums.txt

      - name: Generate release notes from git log
        id: notes
        run: |
          PREV=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV" ]; then
            NOTES=$(git log ${PREV}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## s3backup ${{ github.ref_name }}

            ### Changes
            ${{ steps.notes.outputs.NOTES }}

            ### Downloads

            | Platform | Architecture | File |
            |---|---|---|
            | Linux | amd64 | `s3backup-linux-amd64` |
            | Linux | arm64 | `s3backup-linux-arm64` |
            | macOS | amd64 (Intel) | `s3backup-darwin-amd64` |
            | macOS | arm64 (Apple Silicon) | `s3backup-darwin-arm64` |
            | Windows | amd64 | `s3backup-windows-amd64.exe` |
            | Windows | arm64 | `s3backup-windows-arm64.exe` |

            ### Verify a download
            ```bash
            sha256sum -c s3backup-linux-amd64.sha256
            ```
          files: |
            dist/s3backup-linux-amd64
            dist/s3backup-linux-amd64.sha256
            dist/s3backup-linux-arm64
            dist/s3backup-linux-arm64.sha256
            dist/s3backup-darwin-amd64
            dist/s3backup-darwin-amd64.sha256
            dist/s3backup-darwin-arm64
            dist/s3backup-darwin-arm64.sha256
            dist/s3backup-windows-amd64.exe
            dist/s3backup-windows-amd64.exe.sha256
            dist/s3backup-windows-arm64.exe
            dist/s3backup-windows-arm64.exe.sha256
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

